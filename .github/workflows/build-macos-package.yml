name: Build macOS Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build app and installer packages
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          ls -la script

      - name: Build installer packages
        env:
          SWIFT_BUILD_CONFIGURATION: release
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          REQUIRE_SPARKLE_APPCAST: "1"
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        shell: bash
        run: |
          set -euxo pipefail
          PACKAGE_VERSION="$GITHUB_REF_NAME"
          if [[ "$GITHUB_REF" != refs/tags/v* ]]; then
            PACKAGE_VERSION="$GITHUB_REF_NAME-$GITHUB_SHA"
          fi
          bash ./script/package_app.sh "$PACKAGE_VERSION"

      - name: Upload packages
        uses: actions/upload-artifact@v6
        with:
          name: PeakHalo-macos-packages
          path: |
            dist/release/*.dmg
            dist/release/*.pkg
            dist/release/*.zip
            dist/release/appcast.xml
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euxo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/release/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/release/* \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
